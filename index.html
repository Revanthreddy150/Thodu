<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thodu App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div id="loginSection" class="h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl font-bold text-blue-600 mb-2">Thodu</h1>
        <p class="text-gray-600 mb-8">Travel together, save money.</p>
        <button id="googleLoginBtn" class="w-full max-w-sm bg-white border border-gray-300 py-3 rounded-full shadow hover:bg-gray-50 flex items-center justify-center gap-3 font-medium">
            Sign in with Google
        </button>
    </div>

    <div id="dashboardSection" class="hidden h-screen flex flex-col">
        <div id="content" class="flex-1 p-6 overflow-y-auto"></div>
        
        <nav class="bg-white border-t flex justify-around p-4 shadow-lg">
            <button onclick="renderPage('rides')" class="text-blue-600 font-bold">Rides</button>
            <button onclick="renderPage('profile')" class="text-gray-600">Profile</button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXVilX2kfr31h17TgGOUHUbwPG2JXxYr4",
            authDomain: "tff-earns.firebaseapp.com",
            projectId: "tff-earns",
            storageBucket: "tff-earns.firebasestorage.app",
            messagingSenderId: "762695597074",
            appId: "1:762695597074:web:8d1b687d04af6a74b26ccb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('googleLoginBtn').onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                renderPage('rides');
            } else {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('dashboardSection').classList.add('hidden');
            }
        });

        window.renderPage = (page) => {
            const content = document.getElementById('content');
            const user = auth.currentUser;

            if (page === 'profile') {
                const avatarId = Math.floor(Math.random() * 50) + 1;
                const photo = user.photoURL || `https://i.pravatar.cc/150?u=${avatarId}`;
                
                content.innerHTML = `
                    <div class="flex flex-col items-center mt-10">
                        <img src="${photo}" class="w-24 h-24 rounded-full border-4 border-blue-500 mb-4">
                        <input type="text" value="${user.displayName}" class="text-xl font-bold text-center border-b-2 border-transparent hover:border-blue-500 outline-none mb-6">
                        <button onclick="logout()" class="text-red-500 font-semibold">Logout</button>
                    </div>
                `;
            } else {
                content.innerHTML = `<h2 class="text-2xl font-bold">Available Rides</h2><p class="text-gray-500">No rides yet.</p>`;
            }
        };

        window.logout = () => signOut(auth);
    </script>
</body>
</html>
