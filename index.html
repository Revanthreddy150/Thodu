<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THODU - Ride Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle, #1e1b4b, #0f172a); min-height: 100vh; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-btn { transition: 0.3s; padding: 15px; border-radius: 20px; color: #94a3b8; }
        .nav-btn.active { background: #ec4899; color: white; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="auth-layer" class="flex-1 flex items-center justify-center p-6">
        <div class="glass p-8 rounded-3xl w-full max-w-sm text-center">
            <h1 class="text-3xl font-bold mb-6 text-pink-400">THODU LOGIN</h1>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 bg-white/10 rounded-xl outline-none">
            <input type="password" id="password" placeholder="Password" class="w-full p-4 mb-6 bg-white/10 rounded-xl outline-none">
            
            <button id="login-btn" class="w-full bg-pink-500 py-4 rounded-2xl font-bold text-lg hover:bg-pink-600 transition mb-3">LOGIN</button>
            <button onclick="handleSignup()" class="w-full border border-pink-500 py-4 rounded-2xl font-bold text-lg mb-3">CREATE ACCOUNT</button>
            <button onclick="forgotPass()" class="text-sm text-pink-300 underline">Forgot Password?</button>
        </div>
    </div>

    <div id="app-layer" class="hidden flex flex-col h-screen">
        <div id="view" class="flex-1 p-6 overflow-y-auto"></div>
        <nav class="glass m-4 p-2 rounded-3xl flex justify-around">
            <button onclick="render('rides', this)" class="nav-btn active">RIDES</button>
            <button onclick="render('profile', this)" class="nav-btn">PROFILE</button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- PASTE YOUR CONFIG HERE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDXVilX2kfr31h17TgGOUHUbwPG2JXxYr4",
            authDomain: "tff-earns.firebaseapp.com",
            projectId: "tff-earns",
            storageBucket: "tff-earns.firebasestorage.app",
            messagingSenderId: "762695597074",
            appId: "1:762695597074:web:8d1b687d04af6a74b26ccb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- AUTH LISTENERS ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-layer').classList.add('hidden');
                document.getElementById('app-layer').classList.remove('hidden');
                render('rides');
            } else {
                document.getElementById('auth-layer').classList.remove('hidden');
                document.getElementById('app-layer').classList.add('hidden');
            }
        });

        // --- AUTH ACTIONS ---
        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .catch(e => alert("Login Error: " + e.message));
        };

        window.handleSignup = () => {
            createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .catch(e => alert("Signup Error: " + e.message));
        };

        window.forgotPass = () => {
            const email = document.getElementById('email').value;
            if(!email) return alert("Enter email first");
            sendPasswordResetEmail(auth, email).then(() => alert("Reset link sent to your email!")).catch(e => alert(e.message));
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        // --- PROFILE RENDERER ---
        window.render = (tab, btn) => {
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const view = document.getElementById('view');
            const user = auth.currentUser;

            if(tab === 'profile') {
                view.innerHTML = `
                    <div class="glass p-8 rounded-3xl text-center">
                        <img src="${user.photoURL || 'https://api.dicebear.com/7.x/adventurer/svg?seed=1'}" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-pink-500">
                        <h2 class="text-xl font-bold mb-4">${user.displayName || 'Traveler'}</h2>
                        <div class="grid grid-cols-5 gap-2 my-4 h-32 overflow-y-scroll bg-black/20 p-2 rounded-xl">
                            ${Array.from({length: 50}, (_, i) => `<img onclick="changeAvatar(${i})" src="https://api.dicebear.com/7.x/avataaars/svg?seed=${i}" class="cursor-pointer hover:scale-110">`).join('')}
                        </div>
                        <input type="text" id="newName" placeholder="New Name" class="w-full p-2 mb-2 bg-white/10 rounded-lg text-white">
                        <button onclick="updateProfileData()" class="w-full bg-pink-500 py-2 rounded-lg mb-4 font-bold">UPDATE</button>
                        <button onclick="logout()" class="text-red-400 font-bold">LOGOUT</button>
                    </div>
                `;
            } else {
                view.innerHTML = `<h2 class="text-2xl font-bold p-4">Available Rides</h2>`;
            }
        };

        window.changeAvatar = async (id) => {
            const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=${id}`;
            await updateProfile(auth.currentUser, { photoURL: url });
            render('profile'); 
        };

        window.updateProfileData = async () => {
            const name = document.getElementById('newName').value;
            await updateProfile(auth.currentUser, { displayName: name });
            render('profile');
        };
    </script>
</body>
</html>
